<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Claimflowpay — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
    }

    /* HEADER */
    .header {
      background: #111;
      border-bottom: 1px solid #1e1e1e;
      padding: 0 28px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .header-logo-icon {
      width: 32px;
      height: 32px;
      background: #00c96b;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .header-logo-text {
      display: flex;
      align-items: baseline;
      font-size: 1.05rem;
      font-weight: 500;
      letter-spacing: -0.01em;
    }
    .header-logo-text .w1 { color: #ffffff; }
    .header-logo-text .w2 { color: #00c96b; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .practice-name {
      font-size: 0.75rem;
      color: #555;
    }

    .logout-btn {
      font-size: 0.7rem;
      color: #ff4444;
      cursor: pointer;
      letter-spacing: 1px;
      background: none;
      border: 1px solid #ff444433;
      padding: 4px 10px;
      border-radius: 4px;
      font-family: 'DM Mono', monospace;
    }

    .logout-btn:hover { background: #ff444411; }

    /* LAYOUT */
    .main { display: flex; min-height: calc(100vh - 56px); }

    .sidebar {
      width: 200px;
      background: #0d0d0d;
      border-right: 1px solid #1a1a1a;
      padding: 24px 0;
      flex-shrink: 0;
    }

    .nav-item {
      padding: 10px 24px;
      font-size: 0.75rem;
      color: #555;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.15s;
      border-left: 2px solid transparent;
    }

    .nav-item:hover { color: #aaa; background: #111; }
    .nav-item.active { color: #00ff88; border-left-color: #00ff88; background: #111; }

    .content { flex: 1; padding: 28px; overflow-y: auto; }

    /* STAT CARDS */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 6px;
      padding: 20px;
    }

    .stat-label {
      font-size: 0.65rem;
      color: #555;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 500;
      color: #00ff88;
    }

    /* PANELS */
    .panel { display: none; }
    .panel.active { display: block; }

    .panel-title {
      font-size: 0.8rem;
      color: #00ff88;
      letter-spacing: 2px;
      margin-bottom: 20px;
      text-transform: uppercase;
    }

    /* FORM */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }

    label {
      font-size: 0.65rem;
      color: #555;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    input, select, textarea {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 9px 12px;
      color: #e0e0e0;
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, select:focus, textarea:focus { border-color: #00ff88; }
    textarea { resize: vertical; min-height: 100px; }

    .btn-primary {
      background: #00ff88;
      color: #000;
      border: none;
      border-radius: 4px;
      padding: 10px 24px;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s;
    }

    .btn-primary:hover { background: #00cc6a; }
    .btn-primary:disabled { background: #333; color: #666; cursor: not-allowed; }

    /* RESULTS */
    .result-box {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 6px;
      padding: 20px;
      margin-top: 20px;
    }

    .result-title {
      font-size: 0.7rem;
      color: #00ff88;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .code-tag {
      display: inline-block;
      background: #0a2a1a;
      border: 1px solid #00ff8833;
      color: #00ff88;
      padding: 3px 8px;
      border-radius: 3px;
      font-size: 0.75rem;
      margin: 3px;
    }

    .auth-tag {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 3px;
      font-size: 0.7rem;
      margin: 3px;
    }

    .auth-required { background: #2a0a0a; border: 1px solid #ff444433; color: #ff4444; }
    .auth-ok { background: #0a2a1a; border: 1px solid #00ff8833; color: #00ff88; }

    /* CLAIMS TABLE */
    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.75rem;
    }

    th {
      text-align: left;
      padding: 10px 12px;
      color: #555;
      font-size: 0.65rem;
      letter-spacing: 1px;
      border-bottom: 1px solid #1e1e1e;
    }

    td {
      padding: 10px 12px;
      border-bottom: 1px solid #151515;
      vertical-align: top;
    }

    tr:hover td { background: #111; }

    .status-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 0.65rem;
      letter-spacing: 0.5px;
    }

    .status-SUBMITTED { background: #1a1a2a; color: #8888ff; border: 1px solid #8888ff33; }
    .status-APPROVED { background: #0a2a1a; color: #00ff88; border: 1px solid #00ff8833; }
    .status-DENIED { background: #2a0a0a; color: #ff4444; border: 1px solid #ff444433; }

    .appeal-btn {
      background: none;
      border: 1px solid #ff9900;
      color: #ff9900;
      padding: 3px 8px;
      border-radius: 3px;
      font-size: 0.65rem;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
    }

    .appeal-btn:hover { background: #ff990011; }

    /* APPEAL MODAL */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      display: none;
    }

    .modal {
      background: #111;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 28px;
      width: 90%;
      max-width: 600px;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-title {
      font-size: 0.8rem;
      color: #00ff88;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }

    .modal-close {
      float: right;
      background: none;
      border: none;
      color: #555;
      font-size: 1.2rem;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
    }

    .appeal-letter {
      background: #0a0a0a;
      border: 1px solid #1e1e1e;
      border-radius: 4px;
      padding: 16px;
      font-size: 0.75rem;
      line-height: 1.7;
      white-space: pre-wrap;
      color: #ccc;
      margin-top: 12px;
    }

    .loading {
      color: #555;
      font-size: 0.75rem;
      padding: 20px 0;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .msg { font-size: 0.75rem; padding: 10px 14px; border-radius: 4px; margin-top: 12px; }
    .msg.error { background: #1a0a0a; border: 1px solid #ff4444; color: #ff4444; }
    .msg.success { background: #0a1a0a; border: 1px solid #00ff88; color: #00ff88; }

    /* BILLING */
    .billing-card { background: #111; border: 1px solid #1e1e1e; border-radius: 8px; padding: 28px; margin-bottom: 20px; max-width: 600px; }
    .billing-card.active-plan { border-color: #00ff8844; }
    .billing-plan-name { font-size: 1.4rem; color: #00ff88; margin-bottom: 4px; text-transform: uppercase; }
    .billing-status { display: inline-block; padding: 3px 10px; border-radius: 3px; font-size: 0.65rem; letter-spacing: 1px; margin-bottom: 20px; }
    .billing-status.active { background: #0a2a1a; border: 1px solid #00ff8833; color: #00ff88; }
    .billing-status.trialing { background: #0a1a2a; border: 1px solid #4488ff33; color: #4488ff; }
    .billing-status.past_due { background: #2a1a0a; border: 1px solid #ff990033; color: #ff9900; }
    .billing-status.cancelled { background: #1a0a0a; border: 1px solid #ff444433; color: #ff4444; }
    .billing-status.none { background: #1a1a1a; border: 1px solid #33333333; color: #555; }
    .billing-btn { display: inline-block; padding: 10px 20px; background: transparent; border: 1px solid #2a2a2a; border-radius: 4px; color: #888; font-family: 'DM Mono', monospace; font-size: 0.75rem; letter-spacing: 1px; cursor: pointer; text-decoration: none; transition: all .2s; margin-right: 10px; margin-top: 16px; }
    .billing-btn:hover { border-color: #00ff88; color: #00ff88; }
    .billing-btn.primary { background: #00ff88; border-color: #00ff88; color: #000; }
    .billing-btn.primary:hover { background: #00cc6a; }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-logo">
      <div class="header-logo-icon">
        <svg width="18" height="18" viewBox="0 0 22 22" fill="none">
          <path d="M4 11 L9 16 L18 7" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="header-logo-text"><span class="w1">Claimflow</span><span class="w2">pay</span></div>
    </div>
  <div class="header-right">
    <div class="practice-name" id="practiceName"></div>
    <button class="logout-btn" onclick="logout()">LOGOUT</button>
  </div>
</div>

<div class="main">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="nav-item active" onclick="showPanel('dashboard')">DASHBOARD</div>
    <div class="nav-item" onclick="showPanel('newClaim')">NEW CLAIM</div>
    <div class="nav-item" onclick="showPanel('claims')">ALL CLAIMS</div>
    <div class="nav-item" onclick="showPanel('billing')">BILLING</div>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- DASHBOARD PANEL -->
    <div id="dashboardPanel" class="panel active">
      <div class="panel-title">OVERVIEW</div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">TOTAL CLAIMS</div>
          <div class="stat-value" id="statTotal">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">SUBMITTED</div>
          <div class="stat-value" id="statSubmitted">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">APPROVED</div>
          <div class="stat-value" id="statApproved">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">DENIED</div>
          <div class="stat-value" id="statDenied">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">AUTH REQUIRED</div>
          <div class="stat-value" id="statAuth">—</div>
        </div>
      </div>

      <div class="result-box">
        <div class="result-title">RECENT CLAIMS</div>
        <div id="recentClaims"><div class="loading">Loading claims...</div></div>
      </div>
    </div>

    <!-- NEW CLAIM PANEL -->
    <div id="newClaimPanel" class="panel">
      <div class="panel-title">PROCESS NEW CLAIM</div>
      <div class="form-grid">
        <div class="form-group">
          <label>Patient Name</label>
          <input type="text" id="patientName" placeholder="John Smith"/>
        </div>
        <div class="form-group">
          <label>Date of Service</label>
          <input type="date" id="dateOfService"/>
        </div>
        <div class="form-group">
          <label>Insurance Payer</label>
          <select id="payer">
            <option value="UnitedHealthcare">UnitedHealthcare</option>
            <option value="Aetna">Aetna</option>
            <option value="BlueCross">BlueCross Colorado</option>
            <option value="Cigna">Cigna</option>
            <option value="ColoradoMedicaid">Colorado Medicaid</option>
            <option value="Medicare">Medicare Part B</option>
          </select>
        </div>
        <div class="form-group full">
          <label>Clinical Note</label>
          <textarea id="clinicalNote" placeholder="Patient presents with type 2 diabetes mellitus and hypertension. A1C elevated at 8.2%. Performed office visit and ECG..."></textarea>
        </div>
      </div>
      <button class="btn-primary" id="processBtn" onclick="processClaim()">PROCESS CLAIM →</button>
      <div id="claimResult"></div>
    </div>

    <!-- ALL CLAIMS PANEL -->
    <div id="claimsPanel" class="panel">
      <div class="panel-title">ALL CLAIMS</div>
      <div id="claimsTableWrap"><div class="loading">Loading...</div></div>
    </div>

    <!-- BILLING PANEL -->
    <div id="billingPanel" class="panel">
      <div class="panel-title">BILLING & SUBSCRIPTION</div>
      <div id="billingContent"><div class="loading">Loading billing info...</div></div>
    </div>

  </div>
</div>

<!-- APPEAL MODAL -->
<div class="modal-overlay" id="appealModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">AI APPEAL LETTER GENERATOR</div>
    <div class="form-group" style="margin-bottom:16px">
      <label>Denial Code</label>
      <select id="denialCode">
        <option value="CO-4">CO-4 — Procedure inconsistent with modifier</option>
        <option value="CO-11">CO-11 — Diagnosis inconsistent with procedure</option>
        <option value="CO-29">CO-29 — Timely filing limit exceeded</option>
        <option value="CO-50">CO-50 — Non-covered service</option>
        <option value="CO-97">CO-97 — Service already adjudicated</option>
        <option value="PR-1">PR-1 — Deductible not met</option>
        <option value="PR-2">PR-2 — Coinsurance</option>
        <option value="PR-96">PR-96 — Prior auth not obtained</option>
        <option value="OA-23">OA-23 — Payment adjusted/prior auth</option>
      </select>
    </div>
    <button class="btn-primary" id="appealBtn" onclick="generateAppeal()">GENERATE APPEAL LETTER →</button>
    <div id="appealResult"></div>
  </div>
</div>

<script>
  const API = 'https://app.claimflowpay.com';
  let currentClaimId = null;

  // AUTH CHECK
  const token = localStorage.getItem('cf_token');
  const practiceName = localStorage.getItem('cf_practice');

  if (!token) {
    window.location.href = '/';
  } else {
    document.getElementById('practiceName').textContent = practiceName || '';
    loadStats();
    loadRecentClaims();
  }

  function authHeaders() {
    return {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + token
    };
  }

  function logout() {
    localStorage.clear();
    window.location.href = '/';
  }

  function showPanel(name) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(name + 'Panel').classList.add('active');
    event.target.classList.add('active');

    if (name === 'claims') loadClaimsTable();
    if (name === 'dashboard') { loadStats(); loadRecentClaims(); }
    if (name === 'billing') loadBilling();
  }

  async function loadBilling() {
    const el = document.getElementById('billingContent');
    el.innerHTML = '<div class="loading">Loading billing info...</div>';
    try {
      const res = await fetch(API + '/billing-status', { headers: authHeaders() });
      if (res.status === 401) { logout(); return; }
      const data = await res.json();

      const planLabel = data.plan === 'none' ? 'No Active Plan' : data.plan.charAt(0).toUpperCase() + data.plan.slice(1);
      const statusLabel = data.status === 'none' ? 'NOT SUBSCRIBED' : data.status.toUpperCase().replace('_', ' ');
      const statusClass = data.status;

      let actions = '';
      if (data.portal_url) {
        actions += `<a href="${data.portal_url}" class="billing-btn">MANAGE BILLING →</a>`;
      }
      if (data.status === 'none' || data.status === 'cancelled') {
        actions += `<a href="/billing" class="billing-btn primary">CHOOSE A PLAN →</a>`;
      }

      el.innerHTML = `
        <div class="billing-card ${data.status === 'active' || data.status === 'trialing' ? 'active-plan' : ''}">
          <div class="billing-plan-name">${planLabel}</div>
          <div class="billing-status ${statusClass}">${statusLabel}</div>
          ${data.status === 'trialing' ? '<div style="font-size:0.72rem;color:#555;margin-bottom:8px">You are currently on your 30-day free trial.</div>' : ''}
          ${data.status === 'past_due' ? '<div style="font-size:0.72rem;color:#ff9900;margin-bottom:8px">⚠ Payment past due — please update your payment method.</div>' : ''}
          <div style="font-size:0.72rem;color:#444;line-height:1.8;margin-top:12px">
            Billing is managed securely through Stripe.<br/>
            Update payment method, view invoices, or cancel anytime.
          </div>
          <div>${actions}</div>
        </div>
      `;

      // Show banner if just subscribed
      if (window.location.search.includes('subscribed=1')) {
        el.insertAdjacentHTML('afterbegin', '<div class="msg success" style="max-width:600px;margin-bottom:16px">🎉 Welcome! Your 30-day free trial has started. No charge until your trial ends.</div>');
        history.replaceState({}, '', '/dashboard');
      }
    } catch(e) {
      el.innerHTML = '<div class="msg error">Error loading billing info.</div>';
    }
  }

  async function loadStats() {
    try {
      const res = await fetch(API + '/stats', { headers: authHeaders() });
      if (res.status === 401) { logout(); return; }
      const data = await res.json();
      document.getElementById('statTotal').textContent = data.total;
      document.getElementById('statSubmitted').textContent = data.submitted;
      document.getElementById('statApproved').textContent = data.approved;
      document.getElementById('statDenied').textContent = data.denied;
      document.getElementById('statAuth').textContent = data.auth_required;
    } catch(e) {}
  }

  async function loadRecentClaims() {
    try {
      const res = await fetch(API + '/claims', { headers: authHeaders() });
      if (res.status === 401) { logout(); return; }
      const claims = await res.json();
      const recent = claims.slice(0, 5);
      const el = document.getElementById('recentClaims');
      if (!recent.length) { el.innerHTML = '<div style="color:#555;font-size:0.75rem">No claims yet. Process your first claim!</div>'; return; }
      el.innerHTML = recent.map(c => `
        <div style="padding:10px 0;border-bottom:1px solid #151515;font-size:0.75rem">
          <span style="color:#aaa">${c.patient_name}</span>
          <span style="color:#444;margin:0 8px">·</span>
          <span style="color:#555">${c.payer}</span>
          <span style="color:#444;margin:0 8px">·</span>
          <span class="status-badge status-${c.claim_status?.split(' ')[0]}">${c.claim_status}</span>
        </div>
      `).join('');
    } catch(e) {}
  }

  async function processClaim() {
    const btn = document.getElementById('processBtn');
    const resultEl = document.getElementById('claimResult');
    const patient = document.getElementById('patientName').value.trim();
    const date = document.getElementById('dateOfService').value;
    const payer = document.getElementById('payer').value;
    const note = document.getElementById('clinicalNote').value.trim();

    if (!patient || !date || !note) {
      resultEl.innerHTML = '<div class="msg error">Please fill in all required fields.</div>';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'PROCESSING...';
    resultEl.innerHTML = '<div class="loading">AI is extracting codes and checking prior auth...</div>';

    try {
      const res = await fetch(API + '/process-claim', {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ patient_name: patient, date_of_service: date, payer, clinical_note: note })
      });
      if (res.status === 401) { logout(); return; }
      const data = await res.json();

      resultEl.innerHTML = `
        <div class="result-box">
          <div class="result-title">CLAIM #${data.claim_id} PROCESSED</div>
          <div style="margin-bottom:12px">
            <div style="font-size:0.65rem;color:#555;margin-bottom:6px">ICD-10 DIAGNOSIS CODES</div>
            ${data.icd10_codes.map(c => `<span class="code-tag">${c}</span>`).join('') || '<span style="color:#555;font-size:0.75rem">None extracted</span>'}
          </div>
          <div style="margin-bottom:12px">
            <div style="font-size:0.65rem;color:#555;margin-bottom:6px">CPT PROCEDURE CODES</div>
            ${data.cpt_codes.map(c => `<span class="code-tag">${c}</span>`).join('') || '<span style="color:#555;font-size:0.75rem">None extracted</span>'}
          </div>
          <div>
            <div style="font-size:0.65rem;color:#555;margin-bottom:6px">PRIOR AUTH STATUS</div>
            ${data.auth_results.map(r => `
              <span class="auth-tag ${r.requires_prior_auth ? 'auth-required' : 'auth-ok'}">
                ${r.cpt_code}: ${r.status}
              </span>
            `).join('')}
          </div>
        </div>
      `;
      loadStats();
    } catch(e) {
      resultEl.innerHTML = '<div class="msg error">Error processing claim. Please try again.</div>';
    } finally {
      btn.disabled = false;
      btn.textContent = 'PROCESS CLAIM →';
    }
  }

  async function loadClaimsTable() {
    const el = document.getElementById('claimsTableWrap');
    el.innerHTML = '<div class="loading">Loading claims...</div>';
    try {
      const res = await fetch(API + '/claims', { headers: authHeaders() });
      if (res.status === 401) { logout(); return; }
      const claims = await res.json();

      if (!claims.length) {
        el.innerHTML = '<div style="color:#555;font-size:0.75rem;padding:20px 0">No claims yet.</div>';
        return;
      }

      el.innerHTML = `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>PATIENT</th>
                <th>DATE</th>
                <th>PAYER</th>
                <th>ICD-10</th>
                <th>CPT</th>
                <th>AUTH</th>
                <th>STATUS</th>
                <th>ACTION</th>
              </tr>
            </thead>
            <tbody>
              ${claims.map(c => `
                <tr>
                  <td style="color:#444">${c.id}</td>
                  <td style="color:#aaa">${c.patient_name}</td>
                  <td style="color:#555">${c.date_of_service}</td>
                  <td style="color:#555">${c.payer}</td>
                  <td>${c.icd10_codes.map(x => `<span class="code-tag">${x}</span>`).join('')}</td>
                  <td>${c.cpt_codes.map(x => `<span class="code-tag">${x}</span>`).join('')}</td>
                  <td><span style="color:${c.prior_auth_required==='YES'?'#ff4444':'#00ff88'};font-size:0.7rem">${c.prior_auth_required}</span></td>
                  <td><span class="status-badge status-${c.claim_status?.split(' ')[0]}">${c.claim_status}</span></td>
                  <td style="display:flex;gap:6px">
                    <button class="appeal-btn" onclick="openAppeal(${c.id})">APPEAL</button>
                    <button class="appeal-btn" style="background:#0c1524;border-color:#1e3050;color:#8fa3c4" onclick="downloadSummary(${c.id})">PDF</button>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    } catch(e) {
      el.innerHTML = '<div class="msg error">Error loading claims.</div>';
    }
  }

  function downloadSummary(claimId) {
    const token = localStorage.getItem('cf_token');
    fetch(`${API}/claim-summary/${claimId}`, {
      headers: { 'Authorization': `Bearer ${token}` }
    })
    .then(res => {
      if (!res.ok) throw new Error('Failed to generate PDF');
      return res.blob();
    })
    .then(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `claimflow_claim_${claimId}.pdf`;
      a.click();
      URL.revokeObjectURL(url);
    })
    .catch(() => alert('Error generating claim summary PDF.'));
  }

  function openAppeal(claimId) {
    currentClaimId = claimId;
    document.getElementById('appealResult').innerHTML = '';
    document.getElementById('appealModal').style.display = 'flex';
  }

  function closeModal() {
    document.getElementById('appealModal').style.display = 'none';
    currentClaimId = null;
  }

  async function generateAppeal() {
    if (!currentClaimId) return;
    const btn = document.getElementById('appealBtn');
    const denialCode = document.getElementById('denialCode').value;
    const resultEl = document.getElementById('appealResult');

    btn.disabled = true;
    btn.textContent = 'GENERATING...';
    resultEl.innerHTML = '<div class="loading">AI is writing your appeal letter...</div>';

    try {
      const res = await fetch(API + '/process-denial', {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ claim_id: currentClaimId, denial_code: denialCode })
      });
      if (res.status === 401) { logout(); return; }
      const data = await res.json();

      resultEl.innerHTML = `
        <div style="margin-top:16px">
          <div style="font-size:0.65rem;color:#555;margin-bottom:8px">DENIAL CATEGORY: <span style="color:#ff9900">${data.denial_info.category}</span></div>
          <div style="font-size:0.65rem;color:#555;margin-bottom:16px">ACTION: <span style="color:#aaa">${data.denial_info.recommended_action}</span></div>
          <div class="result-title">GENERATED APPEAL LETTER</div>
          <div class="appeal-letter">${data.appeal_letter}</div>
        </div>
      `;
    } catch(e) {
      resultEl.innerHTML = '<div class="msg error">Error generating appeal. Please try again.</div>';
    } finally {
      btn.disabled = false;
      btn.textContent = 'GENERATE APPEAL LETTER →';
    }
  }
</script>
</body>
</html>
