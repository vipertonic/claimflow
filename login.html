<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Claimflow — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 440px;
      padding: 20px;
    }

    .logo {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo h1 {
      font-size: 2rem;
      font-weight: 500;
      color: #00ff88;
      letter-spacing: 2px;
    }

    .logo p {
      color: #666;
      font-size: 0.75rem;
      margin-top: 6px;
      letter-spacing: 1px;
    }

    .card {
      background: #111;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 36px;
    }

    .tabs {
      display: flex;
      margin-bottom: 28px;
      border-bottom: 1px solid #222;
    }

    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      font-size: 0.8rem;
      color: #555;
      letter-spacing: 1px;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .tab.active {
      color: #00ff88;
      border-bottom: 2px solid #00ff88;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 0.7rem;
      color: #666;
      margin-bottom: 6px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 10px 14px;
      color: #e0e0e0;
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #00ff88;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: #00ff88;
      color: #000;
      border: none;
      border-radius: 4px;
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 1px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }

    .btn:hover { background: #00cc6a; }
    .btn:disabled { background: #333; color: #666; cursor: not-allowed; }

    .error {
      background: #1a0a0a;
      border: 1px solid #ff4444;
      border-radius: 4px;
      padding: 10px 14px;
      color: #ff4444;
      font-size: 0.75rem;
      margin-bottom: 16px;
      display: none;
    }

    .success {
      background: #0a1a0a;
      border: 1px solid #00ff88;
      border-radius: 4px;
      padding: 10px 14px;
      color: #00ff88;
      font-size: 0.75rem;
      margin-bottom: 16px;
      display: none;
    }

    .panel { display: none; }
    .panel.active { display: block; }

    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 0.7rem;
      color: #333;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="logo">
    <h1>CLAIMFLOW</h1>
    <p>AI MEDICAL BILLING PLATFORM</p>
  </div>

  <div class="card">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">LOGIN</div>
      <div class="tab" onclick="switchTab('register')">CREATE ACCOUNT</div>
    </div>

    <div id="errorMsg" class="error"></div>
    <div id="successMsg" class="success"></div>

    <!-- LOGIN PANEL -->
    <div id="loginPanel" class="panel active">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="loginEmail" placeholder="doctor@practice.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••"
               onkeydown="if(event.key==='Enter') doLogin()"/>
      </div>
      <button class="btn" id="loginBtn" onclick="doLogin()">LOGIN →</button>
    </div>

    <!-- REGISTER PANEL -->
    <div id="registerPanel" class="panel">
      <div class="form-group">
        <label>Practice Name</label>
        <input type="text" id="regPractice" placeholder="Denver Family Medicine"/>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="regEmail" placeholder="doctor@practice.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="regPassword" placeholder="Min 8 characters"/>
      </div>
      <div class="form-group">
        <label>NPI Number (Optional)</label>
        <input type="text" id="regNPI" placeholder="1234567890"/>
      </div>
      <div class="form-group">
        <label>Phone (Optional)</label>
        <input type="text" id="regPhone" placeholder="720-555-0000"/>
      </div>
      <button class="btn" id="registerBtn" onclick="doRegister()">CREATE ACCOUNT →</button>
    </div>
  </div>

  <div class="footer">HIPAA COMPLIANT · 256-BIT ENCRYPTION · COLORADO PAYERS</div>
</div>

<script>
  const API = 'https://app.claimflowpay.com';

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('errorMsg').style.display = 'none';
    document.getElementById('successMsg').style.display = 'none';

    if (tab === 'login') {
      document.querySelectorAll('.tab')[0].classList.add('active');
      document.getElementById('loginPanel').classList.add('active');
    } else {
      document.querySelectorAll('.tab')[1].classList.add('active');
      document.getElementById('registerPanel').classList.add('active');
    }
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('successMsg').style.display = 'none';
  }

  function showSuccess(msg) {
    const el = document.getElementById('successMsg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('errorMsg').style.display = 'none';
  }

  async function doLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const btn = document.getElementById('loginBtn');

    if (!email || !password) { showError('Please enter email and password.'); return; }

    btn.disabled = true;
    btn.textContent = 'LOGGING IN...';

    try {
      const res = await fetch(API + '/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (!res.ok) { showError(data.detail || 'Login failed.'); return; }

      localStorage.setItem('cf_token', data.token);
      localStorage.setItem('cf_practice', data.practice_name);
      localStorage.setItem('cf_email', data.email);

      showSuccess('Login successful! Redirecting...');
      setTimeout(() => { window.location.href = '/dashboard'; }, 800);
    } catch (e) {
      showError('Connection error. Please try again.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'LOGIN →';
    }
  }

  async function doRegister() {
    const practice_name = document.getElementById('regPractice').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const npi = document.getElementById('regNPI').value.trim();
    const phone = document.getElementById('regPhone').value.trim();
    const btn = document.getElementById('registerBtn');

    if (!practice_name || !email || !password) {
      showError('Practice name, email and password are required.');
      return;
    }
    if (password.length < 8) {
      showError('Password must be at least 8 characters.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'CREATING ACCOUNT...';

    try {
      const res = await fetch(API + '/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ practice_name, email, password, npi, phone })
      });
      const data = await res.json();

      if (!res.ok) { showError(data.detail || 'Registration failed.'); return; }

      localStorage.setItem('cf_token', data.token);
      localStorage.setItem('cf_practice', data.practice_name);
      localStorage.setItem('cf_email', data.email);

      showSuccess('Account created! Redirecting...');
      setTimeout(() => { window.location.href = '/dashboard'; }, 800);
    } catch (e) {
      showError('Connection error. Please try again.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'CREATE ACCOUNT →';
    }
  }

  // If already logged in, redirect to dashboard
  if (localStorage.getItem('cf_token')) {
    window.location.href = '/dashboard';
  }
</script>
</body>
</html>
